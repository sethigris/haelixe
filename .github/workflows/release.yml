name: Build and Release Axiom

on:
  push:
    tags:
      - 'v*'

# CRITICAL FIX: Grant the GITHUB_TOKEN permission to create releases
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: axiom-linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: axiom-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Binary
        run: |
          cp target/${{ matrix.target }}/release/axiom axiom
          tar -czvf ${{ matrix.asset_name }} axiom

      - name: Upload to GitHub Release
        # Upgraded to v2 for full Node 24 compatibility
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
